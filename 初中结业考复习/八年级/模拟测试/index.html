<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八年级 IoT 全真模拟考试系统 | 终极版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-microchip"></i> IoT 测评中心</div>
        <div class="nav-status"><span id="status-text">系统就绪</span></div>
    </nav>

    <main class="app-container">

        <!-- ================= 1. 欢迎界面 ================= -->
        <section id="start-screen" class="screen active">
            <div class="glass-card start-card">
                <div class="icon-pulse"><i class="fas fa-shield-alt"></i></div>
                <h1>八年级物联网(IoT)全真测评</h1>
                <p class="subtitle">防作弊模式已开启：题序与选项双重随机洗牌</p>
                
                <div class="exam-rules">
                    <h3><i class="fas fa-clipboard-list"></i> 试卷结构 (总分100分)</h3>
                    <ul>
                        <li><span class="badge badge-mcq">单选题</span> 30道 × 2分 = 60分</li>
                        <li><span class="badge badge-code">代码题</span> 2大题 (共10空) × 4分 = 40分</li>
                    </ul>
                </div>

                <ul class="feature-list">
                    <li><i class="fas fa-save"></i> 实时断线记忆，刷新不丢失进度</li>
                    <li><i class="fas fa-redo"></i> 考后详尽错题解析与历史重做记录</li>
                </ul>
                <div class="action-area" style="margin-top:20px;">
                    <button id="btn-start" class="btn btn-primary btn-glow">开始考试 <i class="fas fa-rocket"></i></button>
                    <button id="btn-continue" class="btn btn-secondary hidden">恢复上次进度 <i class="fas fa-history"></i></button>
                </div>
                <p style="margin-top: 20px; color: var(--text-muted); font-size: 0.9rem;">
                    历史重做次数: <span id="retry-counter" style="color:var(--success); font-weight:bold;">0</span> 次
                </p>
            </div>
        </section>

        <!-- ================= 2. 答题界面 (左右分栏) ================= -->
        <section id="quiz-screen" class="screen" style="max-width: 1100px;">
            <header class="quiz-header">
                <div><span class="question-type-badge badge-mcq" id="q-type-indicator">单项选择题</span></div>
                <div class="timer" style="display: flex; align-items: center; gap: 15px;">
                    <span><i class="fas fa-clock"></i> <span id="current-time">00:00</span></span>
                    <button id="btn-force-submit" class="btn btn-danger" style="padding: 5px 12px; font-size: 0.9rem;">强制交卷</button>
                </div>
            </header>

            <div style="display: flex; gap: 25px; align-items: flex-start; flex-wrap: wrap;">
                <!-- 左侧答题卡 -->
                <aside class="glass-card" style="flex: 1; min-width: 250px; padding: 20px;">
                    <h3 style="margin-bottom: 15px; color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                        <i class="fas fa-th"></i> 答题卡
                    </h3>
                    <div style="font-size: 0.85rem; margin-bottom: 10px; color: var(--text-muted);">单选题 (30题)</div>
                    <div class="options-grid" id="grid-mcq" style="grid-template-columns: repeat(5, 1fr); gap: 8px;"></div>
                    
                    <div style="font-size: 0.85rem; margin: 15px 0 10px 0; color: var(--text-muted);">代码填空 (2大题)</div>
                    <div class="options-grid" id="grid-code" style="grid-template-columns: repeat(2, 1fr); gap: 8px;"></div>
                    
                    <div style="margin-top: 20px; font-size: 0.8rem; color: #666; display: flex; gap: 10px; justify-content: center;">
                        <span><span style="display:inline-block;width:10px;height:10px;background:rgba(0,229,255,0.2);border:1px solid #00e5ff;border-radius:2px;"></span> 当前</span>
                        <span><span style="display:inline-block;width:10px;height:10px;background:rgba(255,255,255,0.1);border-radius:2px;"></span> 未答</span>
                        <span><span style="display:inline-block;width:10px;height:10px;background:var(--primary);border-radius:2px;"></span> 已答</span>
                    </div>
                </aside>

                <!-- 右侧作答区 -->
                <main style="flex: 3; min-width: 300px;">
                    <div id="question-container" class="glass-card" style="margin-bottom: 20px;"></div>
                    <div class="quiz-footer">
                        <button id="btn-prev" class="btn btn-outline"><i class="fas fa-arrow-left"></i> 上一题</button>
                        <button id="btn-next" class="btn btn-primary">下一题 <i class="fas fa-arrow-right"></i></button>
                    </div>
                </main>
            </div>
        </section>

        <!-- ================= 3. 结算界面 ================= -->
        <section id="result-screen" class="screen">
            <div class="glass-card result-card">
                <h1 class="score-title">考试完成</h1>
                <div class="score-display">
                    <span id="final-score">--</span><span class="score-unit">分</span>
                </div>
                <p id="evaluation-text">评估中...</p>
                
                <!-- 修复了这里的 ID 匹配问题，并应用了精美的宫格样式 -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <i class="fas fa-list-ul"></i>
                        <div class="stat-value" id="stat-mcq-score">--</div>
                        <div class="stat-label">选择题得分 (60分)</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-code"></i>
                        <div class="stat-value" id="stat-code-score">--</div>
                        <div class="stat-label">代码大题得分 (40分)</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-times-circle" style="color: var(--danger);"></i>
                        <div class="stat-value" id="stat-wrong" style="color: var(--danger);">--</div>
                        <div class="stat-label">错题/错空 总数</div>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-stopwatch"></i>
                        <div class="stat-value" id="stat-time">--</div>
                        <div class="stat-label">总耗时</div>
                    </div>
                </div>

                <div class="action-area mt-30">
                    <button id="btn-review" class="btn btn-primary btn-glow"><i class="fas fa-search"></i> 查看错题解析</button>
                    <button id="btn-export-json" class="btn btn-success"><i class="fas fa-file-export"></i> 导出分析(JSON)</button>
                    <button id="btn-restart" class="btn btn-outline"><i class="fas fa-redo"></i> 重新打乱测试</button>
                </div>
            </div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
